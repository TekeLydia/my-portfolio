<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BROWNY - Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:Arial, sans-serif; margin:0; padding:0; background:#f7f7f7; color:#333;}
    header{background:#222; color:#fff; padding:20px; text-align:center;}
    section{padding:60px 20px; max-width:1000px; margin:auto;}
    h1, h2{text-align:center;}
    /* Sign Up Form Styling */
    #signup{background:#fff; margin-top:40px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
    #signupForm label{font-weight:bold; font-size:14px;}
    #signupForm input{border:1px solid #ccc; border-radius:4px;}
    #signupForm button{background:#222; color:#fff; border:none; border-radius:4px; cursor:pointer;}
    #signupForm button:hover{background:#444;}
    #error{font-size:14px; margin-top:10px;}
  </style>
</head>
<body>

  <header>
    <h1>BROWNY</h1>
    <p>Portfolio Website</p>
  </header>

  <section id="about">
    <h2>About Me</h2>
    <p>This is where your BROWNY portfolio content goes. Replace this text with yours.</p>
  </section>

  <!-- === PART B: SIGN UP FORM START === -->
  <section id="signup">
    <h2>Sign up</h2>
    <form id="signupForm">
      <label>Email</label><br>
      <input type="email" id="email" required><br>
      
      <label>Username</label><br>
      <input type="text" id="username" required><br>
      
      <label>Password</label><br>
      <input type="password" id="password" required><br>
      
      <label>Confirm Password</label><br>
      <input type="password" id="confirmPassword" required><br>
      
      <button type="submit">Sign up</button>
    </form>
    <p id="error" style="color:red;"></p>
  </section>

  <script>
  document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const error = document.getElementById('error');
    error.textContent = "";

    // Rule 1: All fields must be filled
    if (!email || !username || !password || !confirmPassword) {
      error.textContent = "The user must fill all fields";
      return;
    }
    // Rule 2: Passwords must match
    if (password !== confirmPassword) {
      error.textContent = "Password and Confirm password must be the same";
      return;
    }

    // If valid, send data to Python backend
    fetch('/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, username, password})
    })
    .then(res => res.json())
    .then(data => {
      if(data.success){
        alert("Account created successfully!");
        document.getElementById('signupForm').reset();
      } else {
        error.textContent = data.message;
      }
    });
  });
  </script>
  <!-- === PART B: SIGN UP FORM END === -->

</body>
</html>
